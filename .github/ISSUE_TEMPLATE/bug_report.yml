name: Bug Report
description: Report a bug or unexpected behavior in Chart Viewer
title: "[BUG] "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Please include enough detail to reproduce the issue. For chart-loading or georeferencing bugs, describe the data layout without attaching proprietary chart data.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What went wrong?
      placeholder: Describe the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps that trigger the bug.
      placeholder: |
        1. Open Chart Viewer.
        2. Select airport ...
        3. Open chart ...
        4. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: affected-area
    attributes:
      label: Affected Area
      multiple: true
      options:
        - Chart loading / CSV parsing
        - PDF viewer
        - Chart list / bookmarks
        - Globe / georeferencing overlay
        - GDL90 ownship
        - Settings / directories
        - Theme / language
        - Updater / release installer
        - Build / development tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: data-layout
    attributes:
      label: Data Layout
      description: Describe your `charts/` and `csv/` layout, and whether you use the old/global or new/per-airport CSV format.
      placeholder: |
        - CSV format: old/global or new/per-airport
        - Charts directory: flat or airport-nested
        - Relevant files present: Charts.csv, AD_HP.csv, DESIGNATED_POINT.csv, VOR.csv, waypoint PDFs

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide versions relevant to the issue.
      placeholder: |
        - OS:
        - Chart Viewer version:
        - Node.js version, if running from source:
        - Rust version, if running from source:
        - Python version, if georeferencing is involved:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or Error Messages
      description: Paste relevant console, terminal, or app error output.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add screenshots, screen recordings, or other context.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I tested on the latest available Chart Viewer version or current source.
          required: true
        - label: I avoided attaching proprietary or sensitive chart data.
          required: true
