name: Feature Request
description: Suggest a new feature or improvement
title: "[FEATURE] "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Describe the workflow you want to improve and the outcome you need. Concrete aviation/chart-viewer scenarios are more useful than broad product requests.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Workflow
      description: What task is hard, slow, confusing, or currently impossible?
      placeholder: Describe the current limitation.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like Chart Viewer to do?
      placeholder: Describe the feature or behavior you want.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Feature Area
      multiple: true
      options:
        - Chart data / CSV support
        - PDF viewer
        - Chart list / bookmarks
        - Globe / georeferencing
        - GDL90 / ownship
        - Settings / configuration
        - Theme / language
        - Updater / releases
        - Build / developer tooling
        - Accessibility
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low - Nice to have
        - Medium - Improves regular use
        - High - Important for my workflow
        - Critical - Blocking usage
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or Workarounds
      description: What have you tried instead?

  - type: textarea
    id: examples
    attributes:
      label: Examples, Mockups, or References
      description: Add screenshots, diagrams, links, or examples from similar tools.

  - type: textarea
    id: data-impact
    attributes:
      label: Data or Compatibility Impact
      description: Note whether this depends on a chart data format, file naming convention, OS, avionics source, or release/update behavior.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I described the user workflow this would improve.
          required: true
        - label: I considered compatibility with existing local chart data.
          required: true
