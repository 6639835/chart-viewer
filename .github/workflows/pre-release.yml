name: Pre-release Build

on:
  push:
    tags:
      - "v*-beta*"
      - "v*-alpha*"
      - "v*-rc*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    if: github.event_name != 'push' || (startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: macos-arm64
            bundles: dmg,app
          - os: macos-15-intel
            artifact_name: macos-x64
            bundles: dmg,app
          - os: ubuntu-latest
            artifact_name: linux-x64
            bundles: appimage,deb
          - os: windows-latest
            artifact_name: windows-x64
            bundles: nsis

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/georef-sidecar-requirements.txt

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Install georeferencing sidecar dependencies
        run: python -m pip install -r scripts/georef-sidecar-requirements.txt

      - name: Build georeferencing sidecar
        run: npm run georef:sidecar

      - name: Verify georeferencing sidecar
        run: node scripts/verify-tauri-release-package.mjs --sidecar-only

      - name: Test
        run: npm run test

      - name: Build Tauri app
        run: npm run tauri:build -- --bundles ${{ matrix.bundles }} --config '{"bundle":{"createUpdaterArtifacts":true}}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Verify release package
        run: node scripts/verify-tauri-release-package.mjs

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: chart-viewer-${{ matrix.artifact_name }}-prerelease
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*setup.exe
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/**/latest*.json
          if-no-files-found: error
          retention-days: 14

  pre-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-')
    permissions:
      contents: write
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Generate updater manifest
        run: node scripts/generate-tauri-updater-manifest.js artifacts artifacts/latest.json

      - name: Create Pre-release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/latest.json
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.msi
            artifacts/**/*setup.exe
            artifacts/**/*.sig
          draft: false
          prerelease: true
          generate_release_notes: true
          name: Pre-release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
